name: docker

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  docker-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose availability
        run: docker compose version

      - name: Run Docker verify workflow
        run: docker compose run --rm verify
